# Basic Site Settings
locale            : "en-US"
site_theme        : "default"
title             : "Kejie Shen | HKU"
title_separator   : "-"
name              : &name "Kejie Shen"
description       : &description "PhD Student in The University of Hong Kong."
url               : "https://ryanskj.github.io"
baseurl           : ""
repository        : "RyanSKJ/ryanskj.github.io"

# Site Author
author:
  avatar           : "profile.png" # 记得上传一张名为 profile.png 的照片到仓库根目录
  name             : "沈科杰 (Kejie Shen)"
  pronouns         : "He/Him"
  bio              : "PhD Student @ HKU | Researcher in GenAI & SRL | Badminton Influencer (10k+ Followers)"
  location         : "Hong Kong"
  employer         : "The University of Hong Kong"
  email            : "shenkj@connect.hku.hk"
  
  # Academic Profiles
  googlescholar    : "https://scholar.google.com/citations?user=cQ0RrqwAAAAJ"
  orcid            : 
  researchgate     : "https://www.researchgate.net/profile/Shen-Kejie"

  # Repositories and software development
  github           : "RyanSKJ"

  # Social Media & Personal Links
  uri              : "https://www.xiaohongshu.com/user/profile/5f38fb9a000000000100693a" # 你的个人链接
  twitter          : 
  linkedin         : 

# Site Settings
teaser            : 
breadcrumbs       : false
words_per_minute  : 160
future            : true
read_more         : "disabled"
talkmap_link      : false

# Analytics
analytics:
  provider        : "false"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
keep_files:
  - .git

# Markdown Processing
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
