  avatar          : "profile.png"
  name            : "沈科杰 (Kejie Shen)"
  pronouns        : "He/Him"
  bio             : "PhD Student @ HKU | Master @ PKU | Badminton Champion & Influencer"
  location        : "Hong Kong"
