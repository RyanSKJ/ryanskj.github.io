# 下面这些是模板必需的固定配置，请一并保留
include:
  - .htaccess
  - _pages
  - files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
keep_files:
  - .git
markdown: kramdown
highlighter: rouge
collections:
  publications:
    output: true
    permalink: /:collection/:path/
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
